apiVersion: apps/v1
kind: Deployment
metadata:
  name: gssp-test10
  labels:
    backstage.io/kubernetes-id: gssp-test10
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gssp-test10
  template:
    metadata:
      labels:
        app: gssp-test10
        backstage.io/kubernetes-id: gssp-test10
    spec:
      containers:
        - name: gssp-test10
          image: chaitanyapandeygspann/gssp-test10:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000