apiVersion: apps/v1
kind: Deployment
metadata:
  name: gssp-test-pr-1
  labels:
    backstage.io/kubernetes-id: gssp-test-pr-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gssp-test-pr-1
  template:
    metadata:
      labels:
        app: gssp-test-pr-1
        backstage.io/kubernetes-id: gssp-test-pr-1
    spec:
      containers:
        - name: gssp-test-pr-1
          image: chaitanyapandeygspann/gssp-test-pr-1:1.0.2
          imagePullPolicy: Always
          ports:
            - containerPort: 3000