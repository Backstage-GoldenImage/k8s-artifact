apiVersion: apps/v1
kind: Deployment
metadata:
  name: gssp-test5
  labels:
    backstage.io/kubernetes-id: gssp-test5
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gssp-test5
  template:
    metadata:
      labels:
        app: gssp-test5
        backstage.io/kubernetes-id: gssp-test5
    spec:
      containers:
        - name: gssp-test5
          image: chaitanyapandeygspann/gssp-test5:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000