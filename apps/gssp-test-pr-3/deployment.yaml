apiVersion: apps/v1
kind: Deployment
metadata:
  name: gssp-test-pr-3
  labels:
    backstage.io/kubernetes-id: gssp-test-pr-3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gssp-test-pr-3
  template:
    metadata:
      labels:
        app: gssp-test-pr-3
        backstage.io/kubernetes-id: gssp-test-pr-3
    spec:
      containers:
        - name: gssp-test-pr-3
          image: chaitanyapandeygspann/gssp-test-pr-3:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000