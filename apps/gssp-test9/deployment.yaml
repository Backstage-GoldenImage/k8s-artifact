apiVersion: apps/v1
kind: Deployment
metadata:
  name: gssp-test9
  labels:
    backstage.io/kubernetes-id: gssp-test9
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gssp-test9
  template:
    metadata:
      labels:
        app: gssp-test9
        backstage.io/kubernetes-id: gssp-test9
    spec:
      containers:
        - name: gssp-test9
          image: chaitanyapandeygspann/gssp-test9:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000