apiVersion: apps/v1
kind: Deployment
metadata:
  name: gssp-test-pr-4
  labels:
    backstage.io/kubernetes-id: gssp-test-pr-4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gssp-test-pr-4
  template:
    metadata:
      labels:
        app: gssp-test-pr-4
        backstage.io/kubernetes-id: gssp-test-pr-4
    spec:
      containers:
        - name: gssp-test-pr-4
          image: chaitanyapandeygspann/gssp-test-pr-4:1.0.3
          imagePullPolicy: Always
          ports:
            - containerPort: 3000