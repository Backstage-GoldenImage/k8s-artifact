apiVersion: apps/v1
kind: Deployment
metadata:
  name: gssp-test2
  labels:
    backstage.io/kubernetes-id: gssp-test2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gssp-test2
  template:
    metadata:
      labels:
        app: gssp-test2
        backstage.io/kubernetes-id: gssp-test2
    spec:
      containers:
        - name: gssp-test2
          image: chaitanyapandeygspann/gssp-test2:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000