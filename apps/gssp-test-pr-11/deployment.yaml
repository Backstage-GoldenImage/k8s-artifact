apiVersion: apps/v1
kind: Deployment
metadata:
  name: gssp-test-pr-11
  labels:
    backstage.io/kubernetes-id: gssp-test-pr-11
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gssp-test-pr-11
  template:
    metadata:
      labels:
        app: gssp-test-pr-11
        backstage.io/kubernetes-id: gssp-test-pr-11
    spec:
      containers:
        - name: gssp-test-pr-11
          image: chaitanyapandeygspann/gssp-test-pr-11:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000