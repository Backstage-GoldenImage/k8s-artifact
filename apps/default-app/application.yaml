apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: default-app
  namespace: argocd
  labels:
    app.kubernetes.io/name: default-app
spec:
  project: default
  source:
    repoURL: https://github.com/Backstage-GoldenImage/k8s-artifact.git
    targetRevision: main
    path: apps/default-app
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
