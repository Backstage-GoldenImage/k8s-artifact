apiVersion: apps/v1
kind: Deployment
metadata:
  name: gssp-test8
  labels:
    backstage.io/kubernetes-id: gssp-test8
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gssp-test8
  template:
    metadata:
      labels:
        app: gssp-test8
        backstage.io/kubernetes-id: gssp-test8
    spec:
      containers:
        - name: gssp-test8
          image: chaitanyapandeygspann/gssp-test8:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000